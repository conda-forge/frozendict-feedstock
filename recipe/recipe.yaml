# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.4.7"
  python_check_max: "3.14"

package:
  name: frozendict
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/frozendict/frozendict-${{ version }}.tar.gz
  sha256: e478fb2a1391a56c8a6e10cc97c4a9002b410ecd1ac28c18d780661762e271bd

build:
  number: 1
  noarch: python
  script:
    env:
      FROZENDICT_PURE_PY: "1"
      CIBUILDWHEEL: "0"
    content:
      - python -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
    - wheel
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports: frozendict
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - test/
        - pyproject.toml
    requirements:
      run:
        - pytest
        - python ${{ python_min }}.*
    script:
      - pytest -vv --tb=long --color=yes
  - files:
      source:
        - test/
        - pyproject.toml
    requirements:
      run:
        - pytest
        - python ${{ python_check_max }}.*
    script:
      - pytest -vv --tb=long --color=yes

about:
  license: LGPL-3.0-only
  license_file: LICENSE.txt
  summary: An immutable dictionary
  homepage: https://pypi.org/project/frozendict
  repository: https://github.com/Marco-Sulla/python-frozendict

extra:
  recipe-maintainers:
    - ltalirz
    - Marco-Sulla
